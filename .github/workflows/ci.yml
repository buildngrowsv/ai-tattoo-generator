name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Run Vitest tests
        run: npm test

      - name: Build Next.js production bundle
        run: npm run build
        env:
          FAL_KEY: ci-stub-not-real
          STRIPE_SECRET_KEY: sk_test_ci_stub_not_real
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_ci_stub_not_real
